<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fondo de pantalla</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #faf7f2;
      --warm: #e8ddd0;
      --ink: #1a1410;
      --muted: #8c7b6e;
      --accent: #c9a882;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 2.5rem;
    }

    /* Decorative top line */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .label {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      color: var(--muted);
      letter-spacing: 0.02em;
      text-align: center;
    }

    .frame {
      position: relative;
      border: 1px solid var(--warm);
      border-radius: 2px;
      padding: 8px;
      background: white;
      box-shadow: 0 2px 24px rgba(0,0,0,0.06);
      max-width: 320px;
      width: 100%;
    }

    .frame img {
      display: block;
      width: 100%;
      border-radius: 1px;
      aspect-ratio: 9 / 19.5;
      object-fit: cover;
      object-position: center;
    }

    .download-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: var(--ink);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.2s, transform 0.15s;
    }

    .download-btn:hover {
      background: #2e2520;
      transform: translateY(-1px);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .download-btn svg {
      width: 14px;
      height: 14px;
      opacity: 0.7;
    }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-align: center;
      line-height: 1.7;
    }

    /* Corner decorations on frame */
    .frame::before, .frame::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.5;
    }
    .frame::before {
      top: -4px; left: -4px;
      border-width: 1px 0 0 1px;
    }
    .frame::after {
      bottom: -4px; right: -4px;
      border-width: 0 1px 1px 0;
    }
  </style>
</head>
<body>

  <p class="label">para ti, amor</p>

  <div class="frame">
    <img src="wallpaper.jpg" alt="Fondo de pantalla" />
  </div>

  <a class="download-btn" href="wallpaper.jpg" download="wallpaper.jpg">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Guardar fondo
  </a>

  <p class="hint">
    Abre este link desde tu celular<br/>o usa el Shortcut de iOS para que sea automático
  </p>

</body>
</html>
